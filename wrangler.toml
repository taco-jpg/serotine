#:schema node_modules/wrangler/config-schema.json
name = "serotine"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
main = ".open-next/worker.js"

# Workers + Static Assets — serve _next/static/* from .open-next/assets
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Self-reference service binding (required by OpenNext for incremental cache)
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "serotine"

[[d1_databases]]
binding = "serotine_db"
database_name = "serotine-db"
database_id = "16f6cdd1-ce00-4562-833a-ec5c533a33b1"
